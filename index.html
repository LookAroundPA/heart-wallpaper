<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heart Wallpaper</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">Mobile Wallpapers</p>
        <h1>Heart Wallpaper</h1>
        <p class="intro">精选 9:16 手机壁纸，定期更新，可预览和下载。</p>
      </div>
      <a class="github-link" href="https://github.com/LookAroundPA/heart-wallpaper" target="_blank" rel="noreferrer">GitHub</a>
    </header>

    <main>
      <section class="toolbar" aria-label="Wallpaper filters">
        <label class="search-field">
          <span>搜索</span>
          <input id="search" type="search" placeholder="heart, neon, pink" autocomplete="off" />
        </label>
        <div class="tag-filter" id="tagFilter" aria-label="Tags"></div>
      </section>

      <section class="gallery" id="gallery" aria-label="Wallpaper gallery"></section>
      <p class="empty" id="empty" hidden>还没有壁纸。把图片放进 assets/wallpapers/，并在 data/wallpapers.json 里登记后就会显示在这里。</p>
    </main>

    <template id="wallpaperCardTemplate">
      <article class="wallpaper-card">
        <a class="preview-link" target="_blank" rel="noreferrer">
          <img alt="" loading="lazy" />
        </a>
        <div class="card-meta">
          <div>
            <h2></h2>
            <p></p>
          </div>
          <a class="download-link" download>下载</a>
        </div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
