<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heart Wallpaper</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="wallpaper" aria-label="Animated heart wallpaper"></canvas>

    <main class="panel" aria-label="Wallpaper controls">
      <div class="brand">
        <span class="mark" aria-hidden="true"></span>
        <div>
          <h1>Heart Wallpaper</h1>
          <p>流动的爱心粒子壁纸</p>
        </div>
      </div>

      <section class="controls" aria-label="Controls">
        <label>
          <span>Glow</span>
          <input id="glow" type="range" min="0.3" max="1.8" value="1" step="0.1" />
        </label>
        <label>
          <span>Motion</span>
          <input id="motion" type="range" min="0.2" max="2" value="1" step="0.1" />
        </label>
        <label>
          <span>Density</span>
          <input id="density" type="range" min="80" max="300" value="170" step="10" />
        </label>
      </section>

      <button id="save" type="button">Save PNG</button>
    </main>

    <script src="script.js"></script>
  </body>
</html>
